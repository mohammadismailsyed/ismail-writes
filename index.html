<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organic Farming AI - Advanced Platform</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
    scroll-behavior:smooth;
}

body{
    color:white;
    overflow-x:hidden;
}

/* 🌾 REAL FARMING LAND BACKGROUND */
.background{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-2;
    overflow:hidden;

    /* sky + field base */
    background:linear-gradient(to top, #1b5e20 0%, #66bb6a 40%, #a5d6a7 70%, #b3e5fc 100%);
}

/* SUN */
.sun{
    position:absolute;
    top:60px;
    right:100px;
    width:120px;
    height:120px;
    background:radial-gradient(circle,#fff59d,#fbc02d);
    border-radius:50%;
    box-shadow:0 0 80px rgba(255,200,0,0.6);
}

/* FIELD LAYERS */
.field{
    position:absolute;
    bottom:0;
    width:200%;
    height:40%;
    background:url("https://i.imgur.com/8wQfQ9v.png"); /* crop texture */
    background-size:contain;
    opacity:0.8;
    animation:moveField 10s linear infinite;
}

/* second layer slower (parallax feel) */
.field2{
    position:absolute;
    bottom:0;
    width:200%;
    height:35%;
    background:url("https://i.imgur.com/8wQfQ9v.png");
    background-size:contain;
    opacity:0.5;
    animation:moveField 18s linear infinite;
}

/* WIND WAVE EFFECT */
@keyframes moveField{
    0%{transform:translateX(0);}
    100%{transform:translateX(-50%);}
}

/* GRASS WAVING OVERLAY */
.wave{
    position:absolute;
    bottom:0;
    width:100%;
    height:200px;
    background:linear-gradient(to top, rgba(46,125,50,0.8), transparent);
    animation:waveMove 4s ease-in-out infinite;
}

@keyframes waveMove{
    0%,100%{transform:skewX(0deg);}
    50%{transform:skewX(2deg);}
}

/* NAVBAR */
.navbar{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 8%;
    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(10px);
    z-index:1000;
}

.navbar h2{
    color:#7dffb2;
}

.search-box{
    display:flex;
    gap:8px;
}

.search-box input{
    padding:7px;
    border-radius:20px;
    border:none;
    width:180px;
}

.search-box button{
    padding:7px 10px;
    border:none;
    border-radius:20px;
    background:#2ecc71;
    color:white;
    cursor:pointer;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:3rem;
}

.hero p{
    color:#eaffea;
    margin:10px;
}

.btn{
    padding:10px 18px;
    border:none;
    border-radius:25px;
    background:#2ecc71;
    color:white;
    cursor:pointer;
    margin:5px;
}

/* SECTIONS */
section{
    padding:90px 10%;
}

.title{
    text-align:center;
    font-size:2rem;
    margin-bottom:30px;
    color:#7dffb2;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.card{
    background:rgba(0,0,0,0.35);
    padding:18px;
    border-radius:15px;
    backdrop-filter:blur(10px);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-6px);
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    background:#0b2e16;
}
</style>
</head>

<body>

<!-- 🌾 BACKGROUND -->
<div class="background">
    <div class="sun"></div>
    <div class="field"></div>
    <div class="field2"></div>
    <div class="wave"></div>
</div>

<!-- NAVBAR -->
<div class="navbar">
    <h2>🌿 Organic AI Farm</h2>

    <div class="search-box">
        <input id="searchInput" placeholder="Search section...">
        <button onclick="searchSection()">Go</button>
    </div>
</div>

<!-- HERO -->
<div class="hero" id="home">
    <h1>Future of Organic Farming</h1>
    <p>AI • Smart Farming • Real Crop Intelligence</p>
    <button class="btn" onclick="scrollToSection('advanced')">Explore</button>
</div>

<!-- ADVANCED -->
<section id="advanced">
<h2 class="title">🚀 Advanced Farming Techniques</h2>

<div class="grid">
<div class="card">Precision AI Farming Systems</div>
<div class="card">Drone Crop Monitoring</div>
<div class="card">Smart Irrigation Control</div>
<div class="card">Soil Regeneration Systems</div>
</div>
</section>

<footer>
© 2026 Organic AI Farming Platform 🌿
</footer>

<script>
function scrollToSection(id){
    document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

function searchSection(){
    let v=document.getElementById("searchInput").value.toLowerCase();
    document.querySelectorAll("section").forEach(s=>{
        if(s.innerText.toLowerCase().includes(v)){
            s.scrollIntoView({behavior:"smooth"});
        }
    });
}
</script>

</body>
</html>
