<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgriSmart Startup OS</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    overflow: hidden;
    color: white;
}

/* 🌄 BACKGROUND */
#bg {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* LAYOUT */
.container {
    display: flex;
    height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: rgba(0,0,0,0.65);
    padding: 15px;
}

.sidebar h2 {
    color: #22c55e;
}

.sidebar button {
    width: 100%;
    margin: 6px 0;
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: rgba(255,255,255,0.1);
    color: white;
}

.sidebar button:hover {
    background: #22c55e;
    color: black;
}

/* MAIN */
.main {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

input {
    width: 55%;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 12px;
}

.card {
    background: rgba(0,0,0,0.55);
    padding: 12px;
    border-radius: 10px;
}

/* CHAT */
.chat {
    height: 180px;
    overflow-y: auto;
    background: rgba(0,0,0,0.6);
    padding: 8px;
    border-radius: 8px;
}

.user { color: #38bdf8; }
.bot { color: #22c55e; }

button.action {
    margin-top: 6px;
    padding: 8px;
    border: none;
    border-radius: 6px;
    background: #22c55e;
    color: black;
    font-weight: bold;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2 id="title">🌱 AgriSmart</h2>

        <button onclick="setLang('en')">English</button>
        <button onclick="setLang('hi')">हिंदी</button>

        <hr>

        <button onclick="show('dashboard')">Dashboard</button>
        <button onclick="show('weather')">Weather</button>
        <button onclick="show('market')">Market</button>
        <button onclick="show('ai')">AI</button>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="topbar">
            <h3 id="subtitle">Startup Agri Dashboard</h3>

            <input id="search" placeholder="Search..." onkeyup="globalSearch()">

            <button class="action" onclick="startVoice()">🎤</button>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard">
            <div class="grid">
                <div class="card">🌾 Wheat Health: 82%</div>
                <div class="card">🌱 Soil pH: 6.8</div>
                <div class="card">💧 Irrigation: Efficient</div>
            </div>
        </div>

        <!-- WEATHER -->
        <div id="weather" style="display:none;">
            <div class="card">
                <h3>🌦️ Weather</h3>
                <button class="action" onclick="getWeather()">Load</button>
                <p id="w"></p>
            </div>
        </div>

        <!-- MARKET -->
        <div id="market" style="display:none;">
            <div class="card">
                <h3>📡 Market Prices</h3>
                <button class="action" onclick="loadMarket()">Refresh</button>
                <p id="status"></p>
            </div>

            <div class="grid" id="marketGrid"></div>
        </div>

        <!-- AI -->
        <div id="ai" style="display:none;">
            <div class="card">
                <h3>🤖 Agri AI</h3>
                <div class="chat" id="chat"></div>
                <input id="msg" placeholder="Ask question...">
                <button class="action" onclick="send()">Send</button>
            </div>
        </div>

    </div>
</div>

<script>

/* =========================
   🌍 LANGUAGE SYSTEM
========================= */

let lang = "en";

const dict = {
    en: {
        title: "🌱 AgriSmart",
        subtitle: "Startup Agri Dashboard"
    },
    hi: {
        title: "🌱 कृषि स्मार्ट",
        subtitle: "स्टार्टअप कृषि डैशबोर्ड"
    }
};

function setLang(l){
    lang = l;
    document.getElementById("title").innerText = dict[l].title;
    document.getElementById("subtitle").innerText = dict[l].subtitle;
}

/* =========================
   PAGE SWITCH
========================= */

function show(id){
    document.querySelectorAll('.main > div').forEach(d=>d.style.display='none');
    document.getElementById(id).style.display='block';
}

/* =========================
   🔎 GLOBAL SEARCH
========================= */

function globalSearch(){
    let q = document.getElementById("search").value.toLowerCase();

    document.querySelectorAll(".card").forEach(c=>{
        c.style.display = c.innerText.toLowerCase().includes(q)
        ? "block":"none";
    });
}

/* =========================
   🎤 VOICE SEARCH
========================= */

function startVoice(){
    let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if(!SpeechRecognition){
        alert("Voice not supported");
        return;
    }

    let rec = new SpeechRecognition();
    rec.lang = lang === "hi" ? "hi-IN" : "en-IN";
    rec.start();

    rec.onresult = (e)=>{
        let text = e.results[0][0].transcript;
        document.getElementById("search").value = text;
        globalSearch();
    };
}

/* =========================
   🌦️ WEATHER
========================= */

function getWeather(){
    navigator.geolocation.getCurrentPosition(async pos=>{
        let url = `https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true`;
        let r = await fetch(url);
        let d = await r.json();

        document.getElementById("w").innerText =
        `Temp: ${d.current_weather.temperature}°C | Wind: ${d.current_weather.windspeed} km/h`;
    });
}

/* =========================
   📡 MARKET API + FALLBACK
========================= */

const API = "https://api.example.com/crops";

const fallback = [
    {crop:"Wheat",price:2300,unit:"Quintal"},
    {crop:"Rice",price:3100,unit:"Quintal"},
    {crop:"Maize",price:1800,unit:"Quintal"}
];

async function loadMarket(){
    let status = document.getElementById("status");
    let grid = document.getElementById("marketGrid");

    status.innerText = "Loading market...";

    try{
        let res = await fetch(API);
        if(!res.ok) throw new Error();

        let data = await res.json();
        renderMarket(data);

        status.innerText = "Live data loaded";

    }catch(e){
        status.innerText = "Fallback data loaded";
        renderMarket(fallback);
    }
}

function renderMarket(data){
    let grid = document.getElementById("marketGrid");
    grid.innerHTML = "";

    data.forEach(i=>{
        grid.innerHTML += `
        <div class="card">
            <h3>🌾 ${i.crop}</h3>
            <p>₹${i.price} / ${i.unit}</p>
        </div>`;
    });
}

/* =========================
   🤖 AI CHAT
========================= */

function send(){
    let m = document.getElementById("msg");
    if(!m.value) return;

    chat.innerHTML += `<div class='user'>You: ${m.value}</div>`;

    let r =
    m.value.includes("soil") ? "Keep pH 6-7.5"
    : m.value.includes("pest") ? "Use neem oil"
    : "Ask about crops, soil, market";

    chat.innerHTML += `<div class='bot'>AI: ${r}</div>`;
    m.value="";
}

/* =========================
   🌄 REALISTIC FARM ANIMATION
========================= */

const c = document.getElementById("bg");
const x = c.getContext("2d");

c.width = window.innerWidth;
c.height = window.innerHeight;

let clouds = [{x:100,y:80},{x:300,y:120},{x:600,y:90}];
let t = 0;

function draw(){
    x.clearRect(0,0,c.width,c.height);

    let g = x.createLinearGradient(0,0,0,c.height);
    g.addColorStop(0,"#0b3d91");
    g.addColorStop(1,"#2e7d32");

    x.fillStyle = g;
    x.fillRect(0,0,c.width,c.height);

    // sun
    x.fillStyle="yellow";
    x.beginPath();
    x.arc(c.width-120,100,50,0,Math.PI*2);
    x.fill();

    // field waves
    for(let i=0;i<c.width;i+=20){
        let w = Math.sin((i+t)/50)*10;
        x.fillStyle="#1b5e20";
        x.fillRect(i,c.height-140+w,20,140);
    }

    // clouds
    clouds.forEach(cl=>{
        cl.x += 0.4;
        if(cl.x>c.width+100) cl.x=-100;

        x.fillStyle="rgba(255,255,255,0.7)";
        x.beginPath();
        x.arc(cl.x,cl.y,50,0,Math.PI*2);
        x.fill();
    });

    t += 2;
    requestAnimationFrame(draw);
}

draw();

window.onresize=()=>{
    c.width = window.innerWidth;
    c.height = window.innerHeight;
};

</script>

</body>
</html>
