<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate AI Organic Farm</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{overflow:hidden;background:#061a12;color:white}

/* 🌍 3D SCENE */
#scene{
position:fixed;
top:0;left:0;
width:100%;height:100%;
z-index:-3;
}

/* 🌧️ RAIN */
#rain{
position:fixed;
top:0;left:0;
width:100%;height:100%;
z-index:-2;
pointer-events:none;
}

/* ⚡ FLASH */
#flash{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:white;
opacity:0;
z-index:-1;
transition:opacity 0.1s;
pointer-events:none;
}

/* 🌿 FLOATING BACKGROUND ANIMATION */
.leaf{
position:fixed;
width:8px;
height:8px;
background:#2ecc71;
opacity:0.3;
border-radius:50%;
animation:float 12s linear infinite;
z-index:-2;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* UI */
.ui{
position:relative;
z-index:5;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.65));
}

h1{font-size:3rem;color:#7dffb2}
p{color:#cfeedd;margin:10px}

button,input,select{
padding:10px;
border:none;
border-radius:20px;
margin:5px;
}

button{
background:#2ecc71;
color:white;
cursor:pointer;
transition:0.3s;
}
button:hover{transform:scale(1.05)}

section{
padding:60px;
position:relative;
z-index:5;
}

.card{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:12px;
margin:10px;
backdrop-filter:blur(8px);
}
</style>
</head>

<body>

<!-- 🌍 3D FARM -->
<canvas id="scene"></canvas>

<!-- 🌧️ RAIN -->
<canvas id="rain"></canvas>

<!-- ⚡ FLASH -->
<div id="flash"></div>

<!-- 🌿 FLOATING LEAVES -->
<div id="leaves"></div>

<!-- UI -->
<div class="ui">
<h1>🌿 Ultimate AI Organic Farm</h1>
<p>3D Farming + AI + Weather + Real Simulation System</p>
<button onclick="toggleStorm()">⚡ Weather Mode</button>
<button onclick="scrollToSection()">Explore System</button>
</div>

<!-- FEATURES -->
<section id="system">

<div class="card">
<h3>🤖 AI Farming Assistant</h3>
<input id="msg" placeholder="Ask farming question">
<button onclick="askAI()">Ask</button>
<p id="aiReply"></p>
</div>

<div class="card">
<h3>🌱 Crop Recommendation</h3>
<select id="season">
<option>Summer</option>
<option>Rainy</option>
<option>Winter</option>
</select>
<input id="soil" placeholder="Soil type">
<button onclick="crop()">Suggest</button>
<p id="cropOut"></p>
</div>

<div class="card">
<h3>🧪 Soil Analyzer</h3>
<input id="ph" placeholder="pH">
<button onclick="soil()">Analyze</button>
<p id="soilOut"></p>
</div>

<div class="card">
<h3>📊 Market Prices</h3>
<canvas id="chart"></canvas>
</div>

</section>

<script>

/* =========================
   🌍 THREE JS FARM
========================= */
const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x0b2e1a,5,50);

const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,4,8);

const renderer=new THREE.WebGLRenderer({canvas:document.getElementById("scene")});
renderer.setSize(innerWidth,innerHeight);

const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

const ground=new THREE.Mesh(
new THREE.PlaneGeometry(50,50),
new THREE.MeshStandardMaterial({color:0x145a32})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

/* 🌾 CROPS GRID */
for(let x=-8;x<=8;x++){
for(let z=-8;z<=8;z++){
let c=new THREE.Mesh(
new THREE.CylinderGeometry(0.05,0.05,0.5),
new THREE.MeshStandardMaterial({color:0x2ecc71})
);
c.position.set(x*0.6,0.25,z*0.6);
scene.add(c);
}
}

/* =========================
   🌧️ RAIN SYSTEM
========================= */
const rain=document.getElementById("rain");
const ctx=rain.getContext("2d");
rain.width=innerWidth;
rain.height=innerHeight;

let drops=[];
for(let i=0;i<150;i++){
drops.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,l:10+Math.random()*10,s:3+Math.random()*5});
}

function drawRain(){
ctx.clearRect(0,0,rain.width,rain.height);
ctx.strokeStyle="rgba(255,255,255,0.5)";
for(let d of drops){
ctx.beginPath();
ctx.moveTo(d.x,d.y);
ctx.lineTo(d.x,d.y+d.l);
ctx.stroke();
d.y+=d.s;
if(d.y>rain.height){d.y=-10;d.x=Math.random()*rain.width;}
}
}

/* =========================
   ⚡ LIGHTNING
========================= */
const flash=document.getElementById("flash");

function lightning(){
flash.style.opacity=0.9;
setTimeout(()=>flash.style.opacity=0,120);
}

/* =========================
   🌦️ WEATHER MODE
========================= */
let storm=false;

function toggleStorm(){
storm=!storm;

setInterval(()=>{
if(storm){
for(let i=0;i<10;i++){
drops.push({x:Math.random()*innerWidth,y:-10,l:15,s:5});
}
if(Math.random()>0.6) lightning();
light.intensity=0.4;
}else{
light.intensity=1;
}
},800);
}

/* =========================
   🌿 FLOATING LEAVES
========================= */
for(let i=0;i<20;i++){
let l=document.createElement("div");
l.className="leaf";
l.style.left=Math.random()*100+"vw";
l.style.animationDuration=(8+Math.random()*10)+"s";
document.body.appendChild(l);
}

/* =========================
   🤖 AI SYSTEM
========================= */
function askAI(){
let m=document.getElementById("msg").value.toLowerCase();
let r="Use compost and organic farming 🌱";

if(m.includes("rice"))r="Rice needs water-rich soil 🌾";
if(m.includes("soil"))r="Add compost + organic manure 🧪";

document.getElementById("aiReply").innerText=r;
}

/* 🌱 CROP */
function crop(){
let s=document.getElementById("season").value;
let soil=document.getElementById("soil").value;

let r="Wheat recommended";
if(s=="Rainy")r="Rice + Sugarcane 🌾";
if(soil.includes("sandy"))r="Millets + Groundnut 🌱";

document.getElementById("cropOut").innerText=r;
}

/* 🧪 SOIL */
function soil(){
let ph=document.getElementById("ph").value;
let r="Balanced soil 🌿";

if(ph<6)r="Acidic soil → add lime";
if(ph>8)r="Alkaline soil → add compost";

document.getElementById("soilOut").innerText=r;
}

/* 📊 CHART */
new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:["Rice","Wheat","Corn","Tomato"],
datasets:[{data:[30,28,25,40],borderWidth:2}]
}
});

/* 🎥 LOOP */
function animate(){
requestAnimationFrame(animate);
drawRain();
renderer.render(scene,camera);
}
animate();

/* resize */
addEventListener("resize",()=>{
renderer.setSize(innerWidth,innerHeight);
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
rain.width=innerWidth;
rain.height=innerHeight;
});
</script>

</body>
</html>
