<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Organic AI Farming Platform</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{
background:#061a12;
color:white;
overflow:hidden;
}

/* 🌍 3D CANVAS */
#scene{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-3;
}

/* 🌧️ RAIN LAYER */
.rain{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
z-index:-2;
overflow:hidden;
}

.drop{
position:absolute;
width:2px;
height:20px;
background:rgba(255,255,255,0.5);
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

/* ⚡ FLASH */
.flash{
position:fixed;
width:100%;
height:100%;
background:white;
opacity:0;
z-index:-1;
pointer-events:none;
}

/* NAV */
.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:12px 6%;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
z-index:10;
}

/* UI */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
z-index:5;
}

.btn{
padding:10px 20px;
margin:5px;
border:none;
border-radius:25px;
background:#2ecc71;
color:white;
cursor:pointer;
}

section{
padding:80px 8%;
position:relative;
z-index:5;
}

.card{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:12px;
backdrop-filter:blur(10px);
margin:10px 0;
}
</style>
</head>

<body>

<!-- 🌍 3D FARM SCENE -->
<canvas id="scene"></canvas>

<!-- 🌧️ RAIN -->
<div class="rain" id="rain"></div>

<!-- ⚡ FLASH -->
<div class="flash" id="flash"></div>

<!-- NAV -->
<div class="navbar">
<h2>🌿 AI 3D Farm</h2>
<button onclick="toggleStorm()">⚡ Storm Mode</button>
</div>

<!-- HERO -->
<div class="hero">
<h1>3D Smart Organic Farming</h1>
<p>AI + Weather + Real-Time Environment Simulation</p>
<button class="btn" onclick="startStorm()">Activate Weather System</button>
</div>

<!-- INFO -->
<section>
<div class="card">
🌱 This system simulates real farming environment using:
<br><br>
✔ 3D terrain visualization<br>
✔ Rain particle system<br>
✔ Thunder lightning simulation<br>
✔ Smart AI farming tools (expandable)
</div>
</section>

<script>

/* =========================
   🌍 THREE.JS 3D FARM
========================= */
const canvas = document.getElementById("scene");
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0b2e1a, 10, 100);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({canvas});
renderer.setSize(window.innerWidth, window.innerHeight);

/* 🌱 FARM GROUND */
const geometry = new THREE.PlaneGeometry(50, 50);
const material = new THREE.MeshBasicMaterial({color:0x145a32, wireframe:false});
const ground = new THREE.Mesh(geometry, material);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* 🌿 SIMPLE FARM OBJECTS */
for(let i=0;i<30;i++){
let box = new THREE.Mesh(
new THREE.BoxGeometry(0.2, Math.random()*2, 0.2),
new THREE.MeshBasicMaterial({color:0x2ecc71})
);
box.position.set(
(Math.random()-0.5)*20,
0,
(Math.random()-0.5)*20
);
scene.add(box);
}

/* ANIMATE 3D */
function animate(){
requestAnimationFrame(animate);
ground.rotation.z += 0.001;
renderer.render(scene,camera);
}
animate();

/* =========================
   🌧️ RAIN SYSTEM
========================= */
const rain = document.getElementById("rain");

function createRain(){
for(let i=0;i<80;i++){
let drop=document.createElement("div");
drop.className="drop";
drop.style.left=Math.random()*100+"vw";
drop.style.animationDuration=(0.5+Math.random()*1.5)+"s";
drop.style.opacity=Math.random();
rain.appendChild(drop);
}
}
createRain();

/* =========================
   ⚡ THUNDER SYSTEM
========================= */
const flash=document.getElementById("flash");

function lightning(){
flash.style.opacity="0.8";
setTimeout(()=>flash.style.opacity="0",100);
}

function startStorm(){
setInterval(()=>{
createRain();
if(Math.random()>0.7) lightning();
},2000);
}

/* toggle storm */
let storm=false;
function toggleStorm(){
storm=!storm;
if(storm){
startStorm();
}
}

/* resize */
window.addEventListener("resize",()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>
