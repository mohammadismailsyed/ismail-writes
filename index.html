<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Organic Farming Pro Dashboard</title>

<!-- 📊 CHART LIBRARY -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body {
  background:#06150e;
  color:white;
  overflow-x:hidden;
}

/* 🌿 BACKGROUND CANVAS */
canvas#bg {
  position:fixed;
  top:0;
  left:0;
  z-index:-2;
}

/* DARK GLOW OVERLAY */
body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle at top,#2ecc7130,transparent 60%),
             radial-gradient(circle at bottom,#00a86b20,transparent 60%);
  z-index:-1;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:rgba(18,53,36,0.6);
  backdrop-filter:blur(10px);
}

/* GRID */
.container {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:20px;
}

/* CARDS */
.card {
  background:rgba(22,61,42,0.75);
  padding:15px;
  border-radius:12px;
  transition:0.3s;
  box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

.card:hover {
  transform:translateY(-5px);
}

/* FULL WIDTH */
.full {
  grid-column:span 2;
}

/* BUTTONS */
button {
  padding:8px;
  background:#2ecc71;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* CHAT BOX */
#chatBox {
  height:120px;
  overflow:auto;
  background:rgba(0,0,0,0.3);
  padding:8px;
  border-radius:8px;
  margin-top:10px;
}

/* CANVAS CHARTS */
canvas.chart {
  background:rgba(0,0,0,0.2);
  border-radius:10px;
  padding:10px;
}

/* RESPONSIVE */
@media(max-width:800px){
  .container{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>
  <h2>🌱 AI Farming Pro Dashboard</h2>
</header>

<div class="container">

  <!-- WEATHER -->
  <div class="card">
    <h3>🌦 Weather</h3>
    <p id="weather">Loading...</p>
  </div>

  <!-- MARKET -->
  <div class="card">
    <h3>💰 Market Prices</h3>
    <p>Tomato: ₹20-45</p>
    <p>Rice: ₹40-90</p>
    <p>Wheat: ₹25-55</p>
  </div>

  <!-- CHATBOT -->
  <div class="card full">
    <h3>🤖 AI Chatbot</h3>
    <input id="msg" placeholder="Ask farming question">
    <button onclick="chat()">Ask</button>
    <div id="chatBox"></div>
  </div>

  <!-- CROP -->
  <div class="card">
    <h3>🌾 Crop AI</h3>
    <input id="soil" placeholder="soil">
    <input id="season" placeholder="season">
    <input id="water" placeholder="water">
    <button onclick="crop()">Suggest</button>
    <p id="cropOut"></p>
  </div>

  <!-- ANALYTICS -->
  <div class="card">
    <h3>📊 Farming Analytics</h3>
    <canvas id="analyticsChart"></canvas>
  </div>

  <!-- PRICE CHART -->
  <div class="card">
    <h3>💰 Price Trends</h3>
    <canvas id="priceChart"></canvas>
  </div>

  <!-- WEATHER CHART -->
  <div class="card full">
    <h3>🌡 Weather Trend</h3>
    <canvas id="weatherChart"></canvas>
  </div>

</div>

<script>

/* ================= BACKGROUND ANIMATION ================= */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<100;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    dx:(Math.random()-0.5),
    dy:(Math.random()-0.5)
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="rgba(46,204,113,0.5)";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}
animate();

/* ================= WEATHER ================= */
navigator.geolocation.getCurrentPosition(async pos=>{
  let url=`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true`;

  let res=await fetch(url);
  let data=await res.json();

  document.getElementById("weather").innerText=
  `Temp: ${data.current_weather.temperature}°C`;
});

/* ================= CHATBOT ================= */
function chat(){
  let m=document.getElementById("msg").value.toLowerCase();
  let r="Ask farming questions.";

  if(m.includes("pest")) r="Use neem oil spray.";
  if(m.includes("fertilizer")) r="Use compost & organic manure.";

  document.getElementById("chatBox").innerHTML +=
  `<p><b>You:</b> ${m}</p><p><b>AI:</b> ${r}</p>`;
}

/* ================= CROP ================= */
function crop(){
  let soil=document.getElementById("soil").value;
  let season=document.getElementById("season").value;
  let water=document.getElementById("water").value;

  let crops=[];
  if(soil.includes("black")) crops.push("Cotton");
  if(season==="summer") crops.push("Maize");
  if(water==="low") crops.push("Millets");

  document.getElementById("cropOut").innerText=crops.join(", ");
}

/* ================= CHARTS ================= */

// Farming Analytics
new Chart(document.getElementById("analyticsChart"), {
  type:"bar",
  data:{
    labels:["Rice","Wheat","Maize","Millets"],
    datasets:[{
      label:"Yield (tons)",
      data:[30,25,20,35],
      backgroundColor:"#2ecc71"
    }]
  }
});

// Price Chart
new Chart(document.getElementById("priceChart"), {
  type:"line",
  data:{
    labels:["Jan","Feb","Mar","Apr","May"],
    datasets:[{
      label:"Tomato Price",
      data:[20,25,30,40,35],
      borderColor:"#2ecc71",
      fill:false
    }]
  }
});

// Weather Chart
new Chart(document.getElementById("weatherChart"), {
  type:"line",
  data:{
    labels:["Mon","Tue","Wed","Thu","Fri"],
    datasets:[{
      label:"Temperature",
      data:[30,32,31,33,29],
      borderColor:"#00ff88",
      fill:false
    }]
  }
});

</script>

</body>
</html>
